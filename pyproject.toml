[tool.ruff]
line-length = 120

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.ruff.lint]
# Enable standard linting rules + docstring rules (D)
select = ["F", "E", "W", "D", "B"]
ignore = ["D107", "D203", "D213"] # Ignore docstring rules that conflict with Google style

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.coverage.run]
omit = ["src/main.py"]

[tool.mypy]
# Strict type checking
python_version = "3.14"
strict = true
disallow_any_generics = true
disallow_subclassing_any = true
disallow_untyped_calls = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_return_any = true
warn_unreachable = true
strict_equality = true

# Exclude tests from strict type checking
[[tool.mypy.overrides]]
module = "tests.*"
ignore_errors = true
